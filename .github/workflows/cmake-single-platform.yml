name: Build Pico Firmware

on:
  push:
    branches: ["master"]
  pull_request:

env:
  BUILD_TYPE: Release
  PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      # -------------------------
      # Install system dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            cmake \
            ninja-build \
            git \
            python3 \
            python3-venv \
            python3-pip \
            ca-certificates
          rm -rf /var/lib/apt/lists/*

      # -------------------------
      # Checkout repo + submodules
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -------------------------
      # Cache pico-sdk
      # -------------------------
      - name: Cache pico-sdk
        uses: actions/cache@v4
        with:
          path: pico-sdk
          key: pico-sdk-v1

      # -------------------------
      # Fetch pico-sdk (if needed)
      # -------------------------
      - name: Fetch pico-sdk
        run: |
          if [ ! -d "${PICO_SDK_PATH}" ]; then
            git clone --depth=1 https://github.com/raspberrypi/pico-sdk.git "${PICO_SDK_PATH}"
          fi

          cd "${PICO_SDK_PATH}"
          git submodule update --init --recursive

      # -------------------------
      # Cache Python deps
      # -------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      # -------------------------
      # Install Nunavut (nnvg)
      # -------------------------
      - name: Setup Python + Nunavut
        run: |
          python3 -m venv /opt/venv
          . /opt/venv/bin/activate

          pip install --upgrade pip
          pip install nunavut

          echo "/opt/venv/bin" >> $GITHUB_PATH

      # -------------------------
      # Cache build directory
      # -------------------------
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      # -------------------------
      # Configure
      # -------------------------
      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DPICO_SDK_PATH=${PICO_SDK_PATH}

      # -------------------------
      # Build
      # -------------------------
      - name: Build
        run: cmake --build build --parallel

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/**/*.elf
            build/**/*.uf2
